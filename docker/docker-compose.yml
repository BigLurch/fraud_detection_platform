services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: fraud_api
    ports:
      - "8000:8000"
    volumes:
      - ../artifacts:/app/artifacts
      - ../data:/app/data

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    container_name: fraud_ui
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000/predict
    volumes:
      - ../artifacts:/app/artifacts
      - ../data:/app/data

  simulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: fraud_simulator
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000/predict
    command: ["python", "scripts/simulate_transactions.py"]
    volumes:
      - ../artifacts:/app/artifacts
      - ../data:/app/data